syntax = "proto3";

package sign;

message Landmark {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Frame {
  Landmark midEyes = 1;
  repeated Landmark leftHand = 2;
  repeated Landmark rightHand = 3;
  repeated Landmark lip = 4;
}

message RecognizeRequest {
  repeated Frame frames = 1;
  string previous_word = 2;
  string platform = 3;
  string language_code = 4;
}

message Prediction {
  string class_name = 1;
  float confidence = 2;
}

message RecognizeResponse {
  repeated Prediction results = 1;
  string error = 2;
}

service SignRecognitionService {
  rpc Recognize(RecognizeRequest) returns (RecognizeResponse);
}
